version: "3.9"

# ---------------------------------------------------------------------------
# Profiles:
#   core          — postgres + redis + django
#   services      — notification gRPC
#   observability — grafana stack (placeholder)
# ---------------------------------------------------------------------------

x-django-env: &django-env
  DJANGO_SETTINGS_MODULE: config.settings.local
  DJANGO_SECRET_KEY: local-dev-secret-key-not-for-production
  DATABASE_URL: postgres://brandable:brandable@postgres:5432/brandable
  REDIS_URL: redis://redis:6379/0
  GRPC_NOTIFICATION_ADDRESS: notification:50051
  OTEL_ENABLED: "false"

services:
  # ---------------------------------------------------------------------------
  # Core: postgres
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    profiles: [core]
    environment:
      POSTGRES_DB: brandable
      POSTGRES_USER: brandable
      POSTGRES_PASSWORD: brandable
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brandable -d brandable"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Core: redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    profiles: [core]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Core: django
  # ---------------------------------------------------------------------------
  django:
    build:
      context: django/
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    profiles: [core]
    environment:
      <<: *django-env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./django:/app
    command: >
      sh -c "python manage.py migrate --no-input &&
             gunicorn config.wsgi:application
               --bind 0.0.0.0:8000
               --workers 2
               --timeout 30
               --access-logfile -"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Services: notification gRPC
  # ---------------------------------------------------------------------------
  notification:
    build:
      context: services/notification/
      dockerfile: Dockerfile
    restart: unless-stopped
    profiles: [services]
    ports:
      - "50051:50051"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import grpc; ch = grpc.insecure_channel('localhost:50051'); grpc.channel_ready_future(ch).result(timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Observability: Loki + Tempo + Grafana
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:2.9.0
    profiles: [observability]
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  tempo:
    image: grafana/tempo:2.4.0
    profiles: [observability]
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./ops/observability/tempo.yaml:/etc/tempo.yaml
      - tempo_data:/tmp/tempo
    ports:
      - "4317:4317"   # OTLP gRPC
      - "3200:3200"   # HTTP query

  grafana:
    image: grafana/grafana:10.3.0
    profiles: [observability]
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./ops/grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
    depends_on:
      - loki
      - tempo

volumes:
  postgres_data:
  redis_data:
  loki_data:
  tempo_data:
  grafana_data:
