syntax = "proto3";

package chat.v1;

import "google/protobuf/timestamp.proto";

// ChatService — early gRPC service (chat.md §1). Handles direct messages and
// message history. V1 skeleton: Ping is implemented; the room/message RPCs are
// declared here and stubbed in the servicer (UNIMPLEMENTED) until the business
// logic lands. Idempotency is carried via idempotency_key fields on the mutating
// requests (the contract's custom (idempotency.level) option is documentation
// only and is intentionally not declared here).
service ChatService {
  rpc Ping(PingRequest) returns (PingResponse);

  // --- Rooms ---
  rpc CreateDirectRoom(CreateDirectRoomRequest) returns (Room);
  rpc GetRoom(GetRoomRequest) returns (Room);
  rpc ListUserRooms(ListUserRoomsRequest) returns (ListUserRoomsResponse);

  // --- Messages ---
  rpc SendMessage(SendMessageRequest) returns (Message);
  rpc ListMessages(ListMessagesRequest) returns (ListMessagesResponse);

  // --- Real-time stream (bidi) ---
  rpc Subscribe(stream SubscribeRequest) returns (stream RoomEvent);

  // --- Mark read ---
  rpc MarkRead(MarkReadRequest) returns (MarkReadResponse);
}

// --- Room ---

message Room {
  string room_id = 1;
  RoomType type = 2;
  repeated string member_user_ids = 3;
  string created_by_user_id = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp last_message_at = 6;
  Message last_message = 7;  // preview
  int32 unread_count = 8;     // for the calling user
}

enum RoomType {
  ROOM_TYPE_UNSPECIFIED = 0;
  ROOM_TYPE_DIRECT = 1;  // 1:1
  ROOM_TYPE_GROUP = 2;   // 3+ members (V3)
}

message CreateDirectRoomRequest {
  string idempotency_key = 1;
  string other_user_id = 2;
  string trace_id = 3;
}

message GetRoomRequest {
  string room_id = 1;
}

message ListUserRoomsRequest {
  string user_id = 1;  // caller user_id (verified via JWT)
  int32 limit = 2;
  string cursor = 3;
}

message ListUserRoomsResponse {
  repeated Room results = 1;
  string next_cursor = 2;
}

// --- Message ---

message Message {
  string message_id = 1;
  string room_id = 2;
  string sender_user_id = 3;
  MessageType type = 4;
  string content = 5;
  bytes attachment_payload = 6;  // JSON, varies by type
  google.protobuf.Timestamp created_at = 7;
  bool is_deleted = 8;
}

enum MessageType {
  MESSAGE_TYPE_UNSPECIFIED = 0;
  MESSAGE_TYPE_TEXT = 1;
  MESSAGE_TYPE_IMAGE = 2;          // V3
  MESSAGE_TYPE_PRODUCT_SHARE = 3;
  MESSAGE_TYPE_SYSTEM = 4;          // join/leave notifications
}

message SendMessageRequest {
  string idempotency_key = 1;
  string room_id = 2;
  MessageType type = 3;
  string content = 4;
  bytes attachment_payload = 5;
  string trace_id = 6;
}

message ListMessagesRequest {
  string room_id = 1;
  int32 limit = 2;               // max 100
  string before_message_id = 3;  // cursor backwards (history scroll)
}

message ListMessagesResponse {
  repeated Message results = 1;
  string next_before_message_id = 2;  // empty if at history start
}

// --- Subscribe (bidi stream) ---

message SubscribeRequest {
  oneof action {
    SubscribeRooms subscribe_rooms = 1;
    UnsubscribeRoom unsubscribe_room = 2;
    SendInline send_inline = 3;
  }
}

message SubscribeRooms {
  repeated string room_ids = 1;
}

message UnsubscribeRoom {
  string room_id = 1;
}

message SendInline {
  string idempotency_key = 1;
  string room_id = 2;
  MessageType type = 3;
  string content = 4;
}

message RoomEvent {
  string room_id = 1;
  oneof event {
    Message message_created = 2;
    Message message_deleted = 3;
    UserTyping user_typing = 4;
    UserPresence user_presence = 5;
  }
  google.protobuf.Timestamp event_time = 6;
}

message UserTyping {
  string user_id = 1;
  bool is_typing = 2;
}

message UserPresence {
  string user_id = 1;
  bool is_online = 2;
}

// --- Mark read ---

message MarkReadRequest {
  string room_id = 1;
  string up_to_message_id = 2;
}

message MarkReadResponse {
  int32 new_unread_count = 1;
}

// --- Health ---

message PingRequest {}

message PingResponse {
  string version = 1;
  google.protobuf.Timestamp server_time = 2;
}
