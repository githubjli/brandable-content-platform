upstream django_app {
    server 127.0.0.1:8000 fail_timeout=0;
}

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name brandable.example.com;

    ssl_certificate     /etc/ssl/certs/brandable.crt;
    ssl_certificate_key /etc/ssl/private/brandable.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 2g;

    location /static/ {
        alias /opt/brandable-content-platform/django/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /opt/brandable-content-platform/django/media/;
    }

    # Prometheus metrics — never expose publicly. Scrape over the private
    # network only; deny from the internet.
    location = /internal/metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;       # adjust to your private/monitoring subnet
        deny  all;
        proxy_pass         http://django_app;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Django admin — restrict to operator IPs (keep it behind auth + 2FA too).
    location /admin/ {
        allow 127.0.0.1;
        allow 10.0.0.0/8;       # adjust to your admin/VPN subnet
        deny  all;
        proxy_pass         http://django_app;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass         http://django_app;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }
}
